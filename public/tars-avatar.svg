<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#07090d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#39f5c4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#39f5c4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="display" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39f5c4" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#2dd4a8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a8a72" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg)" rx="32"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#39f5c4" stroke-width="0.5">
    <line x1="0" y1="40" x2="256" y2="40"/>
    <line x1="0" y1="80" x2="256" y2="80"/>
    <line x1="0" y1="120" x2="256" y2="120"/>
    <line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="200" x2="256" y2="200"/>
    <line x1="40" y1="0" x2="40" y2="256"/>
    <line x1="80" y1="0" x2="80" y2="256"/>
    <line x1="120" y1="0" x2="120" y2="256"/>
    <line x1="160" y1="0" x2="160" y2="256"/>
    <line x1="200" y1="0" x2="200" y2="256"/>
  </g>

  <!-- Ambient glow behind TARS -->
  <rect x="78" y="40" width="100" height="180" rx="12" fill="url(#glow)" filter="url(#ambientGlow)" opacity="0.5"/>

  <!-- TARS body (monolith) -->
  <rect x="88" y="50" width="80" height="170" rx="8" fill="url(#body)" stroke="#2a3040" stroke-width="1.5"/>

  <!-- TARS vertical accent line left -->
  <rect x="96" y="58" width="3" height="154" rx="1.5" fill="#39f5c4" opacity="0.3"/>

  <!-- TARS vertical accent line right -->
  <rect x="157" y="58" width="3" height="154" rx="1.5" fill="#39f5c4" opacity="0.3"/>

  <!-- TARS horizontal crossbar -->
  <rect x="82" y="200" width="92" height="10" rx="3" fill="#1a1f2e" stroke="#2a3040" stroke-width="1"/>

  <!-- Glowing display panel -->
  <rect x="100" y="68" width="56" height="40" rx="4" fill="url(#display)" filter="url(#glowFilter)"/>

  <!-- Display text lines -->
  <g opacity="0.9">
    <rect x="108" y="76" width="28" height="2" rx="1" fill="#07090d"/>
    <rect x="108" y="82" width="40" height="2" rx="1" fill="#07090d" opacity="0.7"/>
    <rect x="108" y="88" width="18" height="2" rx="1" fill="#07090d" opacity="0.9"/>
    <rect x="108" y="94" width="35" height="2" rx="1" fill="#07090d" opacity="0.5"/>
  </g>

  <!-- Processing indicator dots -->
  <g filter="url(#glowFilter)">
    <circle cx="108" cy="124" r="3" fill="#39f5c4" opacity="0.9"/>
    <circle cx="122" cy="124" r="3" fill="#39f5c4" opacity="0.5"/>
    <circle cx="136" cy="124" r="3" fill="#39f5c4" opacity="0.2"/>
  </g>

  <!-- Data lines -->
  <g stroke="#39f5c4" stroke-width="0.8" opacity="0.2">
    <line x1="104" y1="140" x2="152" y2="140"/>
    <line x1="110" y1="150" x2="146" y2="150"/>
    <line x1="106" y1="160" x2="150" y2="160"/>
  </g>

  <!-- Bottom status bars -->
  <rect x="104" y="178" width="48" height="3" rx="1.5" fill="#39f5c4" opacity="0.4"/>
  <rect x="104" y="178" width="24" height="3" rx="1.5" fill="#ffb86b" opacity="0.6"/>

  <!-- Speaker grill -->
  <g opacity="0.15">
    <rect x="114" y="190" width="3" height="8" rx="1" fill="#39f5c4"/>
    <rect x="122" y="190" width="3" height="8" rx="1" fill="#39f5c4"/>
    <rect x="130" y="190" width="3" height="8" rx="1" fill="#39f5c4"/>
    <rect x="138" y="190" width="3" height="8" rx="1" fill="#39f5c4"/>
  </g>

  <!-- Label -->
  <text x="128" y="237" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" letter-spacing="3" fill="#39f5c4" opacity="0.5">TARS</text>
</svg>
